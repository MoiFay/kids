<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🍎 Attraper les fruits</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: linear-gradient(160deg, #FFFDE7, #FFF3E0); min-height: 100vh; }

    /* Info et score en haut */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
    }
    #top-bar .pill {
      background: white;
      border-radius: 50px;
      padding: 4px 16px;
      box-shadow: 0 3px 8px rgba(0,0,0,.1);
      color: #444;
    }

    #consigne {
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.7rem;
      color: #E65100;
      padding: 4px 12px 8px;
      min-height: 54px;
    }

    /* Terrain de jeu */
    #fruit-area {
      position: relative;
      width: 100%;
      height: calc(100vh - 170px);
      overflow: hidden;
    }

    /* Un fruit tombant */
    .fruit {
      position: absolute;
      font-size: 3.4rem;
      cursor: pointer;
      user-select: none;
      animation: fall linear forwards;
      will-change: transform;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    @keyframes fall {
      from { transform: translateY(-80px) rotate(0deg);   }
      to   { transform: translateY(110vh) rotate(360deg); }
    }

    @keyframes catch {
      0%   { transform: scale(1);   opacity: 1; }
      50%  { transform: scale(1.7); opacity: .7; }
      100% { transform: scale(0);   opacity: 0; }
    }

    .fruit.caught { animation: catch .3s ease forwards !important; pointer-events: none; }

    /* Mauvais fruit = secousse */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px);  }
      60%       { transform: translateX(-8px);  }
      80%       { transform: translateX(8px);   }
    }
    .fruit.wrong-shake { animation: shake .4s ease !important; }

    /* Feedback flottant */
    .float-msg {
      position: absolute;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      pointer-events: none;
      animation: float-up .8s ease forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0);    }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    /* Overlay fin de partie */
    #end-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #end-overlay.show { display: flex; }
    #end-box {
      background: white;
      border-radius: 28px;
      padding: 32px 36px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 16px 40px rgba(0,0,0,.3);
    }
    #end-box .big { font-size: 3.5rem; display: block; margin-bottom: 10px; }
    #end-box h2   { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #333; }
    #end-box p    { color: #777; margin: 8px 0 20px; font-size: 1.1rem; }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="btn-home" aria-label="Retour au menu">🏠</a>
    <span class="nav-title">🍎 Attrape les fruits !</span>
  </nav>

  <!-- Score / timer -->
  <div id="top-bar">
    <div class="pill">🍓 Score : <span id="score">0</span></div>
    <div class="pill">⏱️ <span id="timer">30</span>s</div>
    <div class="pill">❌ <span id="miss">0</span></div>
  </div>

  <!-- Consigne : quel fruit attraper -->
  <div id="consigne" aria-live="polite"></div>

  <!-- Terrain -->
  <div id="fruit-area"></div>

  <!-- Overlay fin de partie -->
  <div id="end-overlay">
    <div id="end-box">
      <span class="big">🏆</span>
      <h2>Temps écoulé !</h2>
      <p id="end-score"></p>
      <button class="btn-action" onclick="startGame()" style="margin-right:12px">🔄 Rejouer</button>
      <a href="index.html" class="btn-action" style="background:var(--col-orange);text-decoration:none">🏠 Accueil</a>
    </div>
  </div>

  <script>
    /* ============================================================
       Jeu : Attraper les fruits
       ============================================================
       Des fruits tombent depuis le haut. Un type de fruit est
       demandé. L'enfant doit cliquer uniquement sur ce fruit.
       Toucher un mauvais fruit = -1 erreur.
       Timer de 30 secondes.
       ============================================================ */

    const ALL_FRUITS = [
      { name: 'Pomme',       emoji: '🍎' },
      { name: 'Banane',      emoji: '🍌' },
      { name: 'Orange',      emoji: '🍊' },
      { name: 'Fraise',      emoji: '🍓' },
      { name: 'Raisin',      emoji: '🍇' },
      { name: 'Pastèque',    emoji: '🍉' },
      { name: 'Pêche',       emoji: '🍑' },
      { name: 'Ananas',      emoji: '🍍' },
    ];

    let score = 0, miss = 0, timeLeft = 30;
    let target = null;
    let spawnInterval = null, timerInterval = null;
    let running = false;

    const scoreEl   = document.getElementById('score');
    const missEl    = document.getElementById('miss');
    const timerEl   = document.getElementById('timer');
    const consEl    = document.getElementById('consigne');
    const area      = document.getElementById('fruit-area');
    const endOverlay= document.getElementById('end-overlay');
    const endScoreEl= document.getElementById('end-score');

    /* --- Choisit un nouveau fruit cible --- */
    function pickTarget() {
      const idx = Math.floor(Math.random() * ALL_FRUITS.length);
      target = ALL_FRUITS[idx];
      consEl.textContent = '👉 Attrape les ' + target.name + 's ! ' + target.emoji;
    }

    /* --- Crée un fruit tombant --- */
    function spawnFruit() {
      if (!running) return;
      // Choix aléatoire dans tous les fruits (plus de chances d'avoir la cible)
      const pool = [...ALL_FRUITS, ...ALL_FRUITS, target, target]; // doublon cible
      const chosen = pool[Math.floor(Math.random() * pool.length)];

      const fruit = document.createElement('div');
      fruit.className = 'fruit';
      fruit.textContent = chosen.emoji;
      fruit.dataset.name = chosen.name;

      const areaW  = area.clientWidth;
      const left   = Math.random() * (areaW - 80) + 5;
      fruit.style.left = left + 'px';

      const duration = (Math.random() * 2.5 + 2).toFixed(1);
      fruit.style.animationDuration = duration + 's';

      /* --- Gestion du clic / touch --- */
      function handleTap(e) {
        e.preventDefault();
        if (!running) return;

        if (chosen.name === target.name) {
          // Bon fruit !
          score++;
          scoreEl.textContent = score;
          fruit.classList.add('caught');
          showFloatMsg('+1 🌟', left + 20, parseFloat(fruit.style.top || '0'), '#4CAF50');
          // Changement de cible de temps en temps
          if (score % 5 === 0) pickTarget();
          setTimeout(() => fruit.remove(), 350);
        } else {
          // Mauvais fruit
          miss++;
          missEl.textContent = miss;
          fruit.classList.add('wrong-shake');
          showFloatMsg('❌', left + 20, parseFloat(fruit.style.top || '0'), '#FF4B4B');
          setTimeout(() => fruit.classList.remove('wrong-shake'), 450);
        }
      }

      fruit.addEventListener('click',      handleTap, { passive: false });
      fruit.addEventListener('touchstart', handleTap, { passive: false });

      area.appendChild(fruit);
      setTimeout(() => fruit.remove(), duration * 1000 + 200);
    }

    /* --- Message flottant --- */
    function showFloatMsg(text, x, y, color) {
      const msg = document.createElement('div');
      msg.className = 'float-msg';
      msg.textContent = text;
      msg.style.left  = x + 'px';
      msg.style.top   = (y + 20) + 'px';
      msg.style.color = color;
      area.appendChild(msg);
      setTimeout(() => msg.remove(), 900);
    }

    /* --- Démarre / réinitialise le jeu --- */
    function startGame() {
      score = 0; miss = 0; timeLeft = 30; running = true;
      scoreEl.textContent = '0';
      missEl.textContent  = '0';
      timerEl.textContent = '30';
      area.innerHTML = '';
      endOverlay.classList.remove('show');

      pickTarget();

      clearInterval(spawnInterval);
      clearInterval(timerInterval);

      spawnInterval = setInterval(spawnFruit, 900);

      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          running = false;
          clearInterval(spawnInterval);
          clearInterval(timerInterval);
          endScoreEl.textContent = 'Tu as attrapé ' + score + ' fruit' + (score > 1 ? 's' : '') + ' ! 🎉';
          endOverlay.classList.add('show');
        }
      }, 1000);
    }

    startGame();
  </script>
</body>
</html>
