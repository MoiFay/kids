<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🍎 Attraper les fruits</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: linear-gradient(160deg, #FFFDE7, #FFF3E0); min-height: 100vh; }

    /* ---- Barre du haut : score + vies ---- */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
    }
    #top-bar .pill {
      background: white;
      border-radius: 50px;
      padding: 4px 16px;
      box-shadow: 0 3px 8px rgba(0,0,0,.1);
      color: #444;
    }

    /* Cœurs */
    #lives-bar {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 6px;
      padding: 2px 0 4px;
      min-height: 44px;
    }

    /* Consigne */
    #consigne {
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.7rem;
      color: #E65100;
      padding: 4px 12px 6px;
      min-height: 54px;
    }

    /* Terrain de jeu */
    #fruit-area {
      position: relative;
      width: 100%;
      height: calc(100vh - 210px);
      overflow: hidden;
    }

    /* Un fruit tombant */
    .fruit {
      position: absolute;
      font-size: 3.4rem;
      cursor: pointer;
      user-select: none;
      animation: fall linear forwards;
      will-change: transform;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    @keyframes fall {
      from { transform: translateY(-80px) rotate(0deg);   }
      to   { transform: translateY(110vh) rotate(360deg); }
    }

    /* Fruit attrapé */
    @keyframes catch-anim {
      0%   { transform: scale(1);   opacity: 1; }
      50%  { transform: scale(1.7); opacity: .7; }
      100% { transform: scale(0);   opacity: 0; }
    }
    .fruit.caught {
      animation: catch-anim .3s ease forwards !important;
      pointer-events: none;
    }

    /* Mauvais fruit — secousse */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px);  }
      60%       { transform: translateX(-8px);  }
      80%       { transform: translateX(8px);   }
    }
    .fruit.wrong-shake { animation: shake .4s ease !important; }

    /* Fruit raté — fond rouge flash */
    .fruit.missed {
      animation: none !important;
      filter: grayscale(1) brightness(.5);
      opacity: 0.4;
    }

    /* Message flottant */
    .float-msg {
      position: absolute;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      pointer-events: none;
      animation: float-up .8s ease forwards;
      z-index: 10;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0);    }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    /* Overlay fin de partie */
    #end-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #end-overlay.show { display: flex; animation: fadeIn .3s ease; }
    #end-box {
      background: white;
      border-radius: 28px;
      padding: 32px 36px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 16px 40px rgba(0,0,0,.3);
    }
    #end-box .big { font-size: 3.5rem; display: block; margin-bottom: 10px; animation: bounce 1s infinite; }
    #end-box h2   { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #333; margin: 0 0 6px; }
    #end-box p    { color: #777; margin: 0 0 20px; font-size: 1.1rem; }
    .end-btns     { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .end-btns button, .end-btns a {
      background: var(--col-green);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 22px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 0 rgba(0,0,0,.15);
    }
    .end-btns a { background: var(--col-orange); }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="btn-home" aria-label="Retour au menu">🏠</a>
    <span class="nav-title">🍎 Attrape les fruits !</span>
  </nav>

  <!-- Score -->
  <div id="top-bar">
    <div class="pill">🍓 Score : <span id="score">0</span></div>
    <div class="pill">🏆 Record : <span id="record">0</span></div>
  </div>

  <!-- Vies (cœurs) -->
  <div id="lives-bar" aria-live="polite"></div>

  <!-- Consigne -->
  <div id="consigne" aria-live="polite"></div>

  <!-- Terrain -->
  <div id="fruit-area"></div>

  <!-- Overlay fin de partie -->
  <div id="end-overlay">
    <div id="end-box">
      <span class="big" id="end-emoji">💔</span>
      <h2 id="end-title">Perdu !</h2>
      <p id="end-score"></p>
      <div class="end-btns">
        <button id="btn-restart">🔄 Rejouer</button>
        <a href="index.html">🏠 Accueil</a>
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
       Jeu : Attraper les fruits — v2 (3 vies, pas de timer)
       ============================================================
       Règles :
         - Le jeu demande d'attraper un type de fruit
         - Attraper le bon fruit = +1 point 🌟
         - Rater le fruit demandé (il tombe sans être cliqué) = -1 vie ❤️
         - Cliquer sur le mauvais fruit = -1 vie ❤️
         - 0 vie = game over
         - Cible change tous les 5 fruits attrapés
       ============================================================ */

    const MAX_LIVES = 3;

    const ALL_FRUITS = [
      { name: 'Pomme',    emoji: '🍎' },
      { name: 'Banane',   emoji: '🍌' },
      { name: 'Orange',   emoji: '🍊' },
      { name: 'Fraise',   emoji: '🍓' },
      { name: 'Raisin',   emoji: '🍇' },
      { name: 'Pastèque', emoji: '🍉' },
      { name: 'Pêche',    emoji: '🍑' },
      { name: 'Ananas',   emoji: '🍍' },
    ];

    let score        = 0;
    let lives        = MAX_LIVES;
    let target       = null;
    let running      = false;
    let spawnInterval= null;
    let record       = parseInt(localStorage.getItem('fruits-record') || '0');

    const scoreEl   = document.getElementById('score');
    const recordEl  = document.getElementById('record');
    const livesEl   = document.getElementById('lives-bar');
    const consEl    = document.getElementById('consigne');
    const area      = document.getElementById('fruit-area');
    const endOverlay= document.getElementById('end-overlay');
    const endEmoji  = document.getElementById('end-emoji');
    const endTitle  = document.getElementById('end-title');
    const endScore  = document.getElementById('end-score');
    const btnRestart= document.getElementById('btn-restart');

    recordEl.textContent = record;

    /* ============================================================
       AUDIO (iOS/Android safe)
       ============================================================ */
    let audioCtx = null;
    function unlockAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      try {
        const b = audioCtx.createBuffer(1,1,22050);
        const s = audioCtx.createBufferSource();
        s.buffer = b; s.connect(audioCtx.destination); s.start(0);
      } catch(e) {}
    }
    function playCatch() {
      if (!audioCtx) return;
      const t=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(400,t);
      o.frequency.exponentialRampToValueAtTime(800,t+0.1);
      g.gain.setValueAtTime(0.25,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.start(t); o.stop(t+0.17);
    }
    function playLoseLife() {
      if (!audioCtx) return;
      [300,220].forEach((f,i) => {
        const t=audioCtx.currentTime+i*0.14, o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type='sawtooth'; o.frequency.value=f;
        g.gain.setValueAtTime(0.2,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
        o.start(t); o.stop(t+0.2);
      });
    }
    function playGameOver() {
      if (!audioCtx) return;
      [300,250,180].forEach((f,i) => {
        const t=audioCtx.currentTime+i*0.15, o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type='sawtooth'; o.frequency.value=f;
        g.gain.setValueAtTime(0.22,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
        o.start(t); o.stop(t+0.2);
      });
    }

    /* ============================================================
       AFFICHAGE DES VIES
       ============================================================ */
    function renderLives() {
      livesEl.textContent = '❤️'.repeat(lives) + '🖤'.repeat(MAX_LIVES - lives);
    }

    /* ============================================================
       PERTE DE VIE
       ============================================================ */
    function loseLife(reason) {
      if (!running) return;
      lives--;
      renderLives();
      playLoseLife();
      showFloatMsg(reason, area.clientWidth / 2, 20, '#FF4B4B');
      if (lives <= 0) {
        gameOver();
      }
    }

    /* ============================================================
       GAME OVER
       ============================================================ */
    function gameOver() {
      running = false;
      clearInterval(spawnInterval);
      area.innerHTML = '';
      playGameOver();

      if (score > record) {
        record = score;
        localStorage.setItem('fruits-record', record);
        recordEl.textContent = record;
        endEmoji.textContent = '🏆';
        endTitle.textContent = 'Nouveau record !';
      } else if (score >= 10) {
        endEmoji.textContent = '🌟';
        endTitle.textContent = 'Bravo !';
      } else {
        endEmoji.textContent = '💔';
        endTitle.textContent = 'Perdu !';
      }
      endScore.textContent = 'Tu as attrapé ' + score + ' fruit' + (score > 1 ? 's' : '') + ' !';
      endOverlay.classList.add('show');
    }

    /* ============================================================
       CIBLE
       ============================================================ */
    function pickTarget() {
      const idx = Math.floor(Math.random() * ALL_FRUITS.length);
      target = ALL_FRUITS[idx];
      consEl.textContent = '👉 Attrape les ' + target.name + 's ! ' + target.emoji;
    }

    /* ============================================================
       SPAWN D'UN FRUIT
       ============================================================ */
    function spawnFruit() {
      if (!running) return;

      /* Pool : plus de chances d'avoir la cible pour les enfants */
      const pool = [...ALL_FRUITS, target, target, target];
      const chosen = pool[Math.floor(Math.random() * pool.length)];

      const fruit = document.createElement('div');
      fruit.className  = 'fruit';
      fruit.textContent = chosen.emoji;

      const areaW   = area.clientWidth;
      const left    = Math.random() * (areaW - 80) + 5;
      fruit.style.left = left + 'px';

      /* Durée de chute : 3 à 5s, assez lent pour les petits */
      const duration = (Math.random() * 2 + 3).toFixed(1);
      fruit.style.animationDuration = duration + 's';

      const isTarget = chosen.name === target.name;

      /* ---- Tap sur le fruit ---- */
      function handleTap(e) {
        e.preventDefault();
        if (!running) return;
        if (fruit.classList.contains('caught') || fruit.classList.contains('wrong-shake')) return;

        unlockAudio();

        if (isTarget) {
          /* ✅ Bon fruit */
          fruit.classList.add('caught');
          playCatch();
          score++;
          scoreEl.textContent = score;
          if (score > record) {
            record = score;
            localStorage.setItem('fruits-record', record);
            recordEl.textContent = record;
          }
          showFloatMsg('+1 🌟', left + 20, 40, '#4CAF50');
          /* Change de cible tous les 5 fruits */
          if (score % 5 === 0) pickTarget();
          setTimeout(() => fruit.remove(), 350);
        } else {
          /* ❌ Mauvais fruit */
          fruit.classList.add('wrong-shake');
          showFloatMsg('💔 Mauvais fruit !', left, 40, '#FF4B4B');
          loseLife('💔');
          setTimeout(() => fruit.classList.remove('wrong-shake'), 450);
        }
      }

      fruit.addEventListener('click',      handleTap, { passive: false });
      fruit.addEventListener('touchstart', handleTap, { passive: false });

      area.appendChild(fruit);

      /* Le fruit touche le bas — si c'était la cible, -1 vie */
      setTimeout(() => {
        if (!fruit.isConnected) return;  // déjà supprimé (attrapé)
        if (running && isTarget && !fruit.classList.contains('caught')) {
          loseLife('💨 Raté !');
        }
        fruit.remove();
      }, parseFloat(duration) * 1000 + 100);
    }

    /* ============================================================
       MESSAGE FLOTTANT
       ============================================================ */
    function showFloatMsg(text, x, y, color) {
      const msg = document.createElement('div');
      msg.className   = 'float-msg';
      msg.textContent = text;
      msg.style.left  = Math.max(0, x) + 'px';
      msg.style.top   = y + 'px';
      msg.style.color = color;
      area.appendChild(msg);
      setTimeout(() => msg.remove(), 900);
    }

    /* ============================================================
       DÉMARRAGE
       ============================================================ */
    function startGame() {
      score    = 0;
      lives    = MAX_LIVES;
      running  = true;
      scoreEl.textContent = '0';
      renderLives();
      area.innerHTML = '';
      endOverlay.classList.remove('show');
      pickTarget();
      clearInterval(spawnInterval);
      spawnInterval = setInterval(spawnFruit, 1000);
    }

    /* Bouton rejouer */
    btnRestart.addEventListener('click', () => { unlockAudio(); startGame(); });
    btnRestart.addEventListener('touchstart', e => { e.preventDefault(); unlockAudio(); startGame(); }, { passive: false });

    /* Démarrage automatique */
    startGame();
  </script>
</body>
</html>
