<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🇬🇧 Apprendre l'anglais</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: linear-gradient(160deg, #FFF8E1, #E8EAF6); min-height: 100vh; }

    /* ---- Overlay "Appuie pour commencer" (déverrouillag audio mobile) ---- */
    #unlock-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #3F51B5, #1A237E);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      cursor: pointer;
    }
    #unlock-overlay.hidden { display: none; }

    #unlock-overlay .ul-emoji {
      font-size: 5rem;
      animation: bounce 1.5s infinite;
    }
    #unlock-overlay h2 {
      font-family: 'Fredoka One', cursive;
      color: white;
      font-size: 2.2rem;
      text-align: center;
      padding: 0 24px;
    }
    #unlock-overlay p {
      color: rgba(255,255,255,.75);
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      text-align: center;
      padding: 0 24px;
    }
    #unlock-overlay .ul-btn {
      background: #FFD700;
      color: #1A237E;
      border: none;
      border-radius: 50px;
      padding: 18px 44px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.25);
      animation: star-pulse 1.2s infinite;
      min-width: 200px;
      min-height: 70px;
    }

    /* ---- Sélecteur de thème ---- */
    #theme-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 10px 14px;
    }

    .theme-btn {
      border: 3px solid transparent;
      border-radius: 50px;
      padding: 8px 18px;
      background: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,.12);
      color: #444;
      transition: transform .12s, box-shadow .12s;
    }

    .theme-btn:active  { transform: scale(.95); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .theme-btn.active  { background: #3F51B5; color: white; border-color: #1A237E; }

    /* ---- Mot / phrase à apprendre ---- */
    #word-display {
      text-align: center;
      padding: 10px 16px 4px;
    }

    #word-english {
      font-family: 'Fredoka One', cursive;
      font-size: 2.6rem;
      color: #1A237E;
      display: block;
    }

    #word-french {
      font-size: 1.1rem;
      color: #888;
      display: block;
      margin-top: 2px;
    }

    #word-emoji {
      font-size: 4rem;
      display: block;
      margin: 6px 0;
      animation: bounce 2s infinite;
    }

    /* ---- Bouton de prononciation ---- */
    #btn-speak {
      display: block;
      margin: 0 auto 8px;
      background: #3F51B5;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,.2);
      transition: transform .12s, box-shadow .12s;
      min-height: 56px;
    }
    #btn-speak:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,.2);
    }
    #btn-speak.speaking { background: #FF8C00; }

    /* Pulse pour inviter à taper le bouton écouter */
    @keyframes speak-pulse {
      0%, 100% { box-shadow: 0 5px 0 rgba(0,0,0,.2), 0 0 0 0 rgba(63,81,181,.4); }
      50%       { box-shadow: 0 5px 0 rgba(0,0,0,.2), 0 0 0 12px rgba(63,81,181,0); }
    }
    #btn-speak:not(.speaking) { animation: speak-pulse 2s infinite; }

    /* ---- Grille de réponses ---- */
    #answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 8px 16px 24px;
      max-width: 480px;
      margin: 0 auto;
    }

    .ans-btn {
      border: 3px solid transparent;
      border-radius: 20px;
      background: white;
      box-shadow: 0 5px 0 rgba(0,0,0,.13);
      cursor: pointer;
      padding: 14px 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-height: 100px;
      transition: transform .12s, box-shadow .12s;
    }
    .ans-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,.13);
    }
    .ans-btn .ans-emoji { font-size: 2.2rem; }
    .ans-btn.correct { background: #C8E6C9; border-color: #4CAF50; }
    .ans-btn.wrong   { background: #FFCDD2; border-color: #FF4B4B; }

    /* ---- Score ---- */
    #score-zone {
      display: flex;
      justify-content: center;
      gap: 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      padding: 6px 16px 0;
    }
    #score-zone span {
      background: white;
      border-radius: 50px;
      padding: 4px 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,.1);
    }

    /* ---- Feedback ---- */
    #feedback {
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      min-height: 52px;
      padding: 4px;
    }

    /* ---- Info SpeechSynthesis ---- */
    #speech-info {
      text-align: center;
      font-size: .85rem;
      color: #bbb;
      padding: 2px 16px 6px;
    }
  </style>
</head>
<body>

  <!--
    ============================================================
    OVERLAY "Appuie pour commencer"
    Obligatoire sur iOS/Android pour débloquer AudioContext
    et SpeechSynthesis (politique autoplay des navigateurs).
    ============================================================
  -->
  <div id="unlock-overlay" role="dialog" aria-modal="true" aria-label="Démarrer le jeu">
    <span class="ul-emoji" aria-hidden="true">🇬🇧</span>
    <h2>English Time !</h2>
    <p>Appuie pour activer la voix et les sons 🔊</p>
    <button class="ul-btn" id="btn-unlock">▶ Jouer !</button>
  </div>

  <nav class="nav-bar">
    <a href="index.html" class="btn-home" aria-label="Retour au menu">🏠</a>
    <span class="nav-title">🇬🇧 English Time !</span>
  </nav>

  <!-- Score -->
  <div id="score-zone">
    ✅ <span id="good">0</span> &nbsp; ❌ <span id="bad">0</span>
  </div>

  <!-- Sélecteur de thème -->
  <div id="theme-selector" role="group" aria-label="Choisir un thème"></div>

  <!-- Affichage du mot à apprendre -->
  <div id="word-display">
    <span id="word-emoji" aria-hidden="true"></span>
    <span id="word-english" aria-live="polite"></span>
    <span id="word-french"></span>
  </div>

  <!-- Bouton prononcer -->
  <button id="btn-speak">🔊 Écouter</button>
  <p id="speech-info"></p>

  <!-- Feedback -->
  <div id="feedback" aria-live="polite"></div>

  <!-- Réponses -->
  <div id="answers" role="group" aria-label="Choisir la bonne réponse"></div>

  <script>
    /* ============================================================
       Jeu : Apprendre l'anglais
       ============================================================
       Thèmes disponibles :
         1. Compter (numbers)
         2. Couleurs (colors)
         3. Jours de la semaine (days)
         4. Salutations (greetings)
         5. Se présenter (introductions)

       Fonctionnement :
         - On affiche le mot EN anglais avec son emoji
         - On propose 4 traductions françaises
         - L'enfant doit choisir la bonne traduction
         - Le mot est prononcé en anglais via SpeechSynthesis
       ============================================================ */

    const THEMES = {
      numbers: {
        label: '🔢 Compter',
        items: [
          { en: 'One',   fr: 'Un',    emoji: '1️⃣' },
          { en: 'Two',   fr: 'Deux',  emoji: '2️⃣' },
          { en: 'Three', fr: 'Trois', emoji: '3️⃣' },
          { en: 'Four',  fr: 'Quatre',emoji: '4️⃣' },
          { en: 'Five',  fr: 'Cinq',  emoji: '5️⃣' },
          { en: 'Six',   fr: 'Six',   emoji: '6️⃣' },
          { en: 'Seven', fr: 'Sept',  emoji: '7️⃣' },
          { en: 'Eight', fr: 'Huit',  emoji: '8️⃣' },
          { en: 'Nine',  fr: 'Neuf',  emoji: '9️⃣' },
          { en: 'Ten',   fr: 'Dix',   emoji: '🔟' },
        ]
      },
      colors: {
        label: '🎨 Couleurs',
        items: [
          { en: 'Red',    fr: 'Rouge',  emoji: '🔴' },
          { en: 'Blue',   fr: 'Bleu',   emoji: '🔵' },
          { en: 'Yellow', fr: 'Jaune',  emoji: '🟡' },
          { en: 'Green',  fr: 'Vert',   emoji: '🟢' },
          { en: 'Orange', fr: 'Orange', emoji: '🟠' },
          { en: 'Purple', fr: 'Violet', emoji: '🟣' },
          { en: 'Pink',   fr: 'Rose',   emoji: '🩷' },
          { en: 'White',  fr: 'Blanc',  emoji: '⚪' },
          { en: 'Black',  fr: 'Noir',   emoji: '⚫' },
        ]
      },
      days: {
        label: '📅 Jours',
        items: [
          { en: 'Monday',    fr: 'Lundi',    emoji: '📅' },
          { en: 'Tuesday',   fr: 'Mardi',    emoji: '📅' },
          { en: 'Wednesday', fr: 'Mercredi', emoji: '📅' },
          { en: 'Thursday',  fr: 'Jeudi',    emoji: '📅' },
          { en: 'Friday',    fr: 'Vendredi', emoji: '🎉' },
          { en: 'Saturday',  fr: 'Samedi',   emoji: '🌟' },
          { en: 'Sunday',    fr: 'Dimanche', emoji: '☀️' },
        ]
      },
      greetings: {
        label: '👋 Bonjour',
        items: [
          { en: 'Hello',         fr: 'Bonjour',    emoji: '👋' },
          { en: 'Good morning',  fr: 'Bonjour (matin)', emoji: '🌅' },
          { en: 'Good night',    fr: 'Bonne nuit', emoji: '🌙' },
          { en: 'Goodbye',       fr: 'Au revoir',  emoji: '👋' },
          { en: 'How are you?',  fr: 'Comment vas-tu ?', emoji: '😊' },
          { en: 'Very well',     fr: 'Très bien',  emoji: '😄' },
          { en: 'Thank you',     fr: 'Merci',      emoji: '🙏' },
          { en: 'Please',        fr: 'S\'il te plaît', emoji: '✨' },
        ]
      },
      intro: {
        label: '🙋 Je me présente',
        items: [
          { en: 'My name is…',  fr: 'Je m\'appelle…', emoji: '🙋' },
          { en: 'I am …',       fr: 'J\'ai … ans',    emoji: '🎂' },
          { en: 'I like…',      fr: 'J\'aime…',       emoji: '❤️' },
          { en: 'I live in…',   fr: 'J\'habite à…',   emoji: '🏠' },
          { en: 'I am happy',   fr: 'Je suis heureux',emoji: '😄' },
          { en: 'I am sad',     fr: 'Je suis triste', emoji: '😢' },
          { en: 'Yes',          fr: 'Oui',            emoji: '✅' },
          { en: 'No',           fr: 'Non',            emoji: '❌' },
        ]
      }
    };

    /* ============================================================
       PARAMÈTRES GLOBAUX
       ============================================================ */
    let currentTheme = 'numbers';
    let currentItem  = null;
    let goodCount    = 0, badCount = 0;
    let locked       = false;
    let audioUnlocked = false;   // true après le premier geste utilisateur

    /* --- AudioContext PARTAGÉ (une seule instance = obligatoire sur mobile) --- */
    let audioCtx = null;

    /* --- Voix anglaise pour SpeechSynthesis --- */
    let engVoice = null;

    /* ---- Éléments DOM ---- */
    const unlockOverlay = document.getElementById('unlock-overlay');
    const btnUnlock     = document.getElementById('btn-unlock');
    const themeSelEl    = document.getElementById('theme-selector');
    const emojiEl       = document.getElementById('word-emoji');
    const englishEl     = document.getElementById('word-english');
    const frenchEl      = document.getElementById('word-french');
    const speakBtn      = document.getElementById('btn-speak');
    const answersEl     = document.getElementById('answers');
    const feedbackEl    = document.getElementById('feedback');
    const goodEl        = document.getElementById('good');
    const badEl         = document.getElementById('bad');
    const speechInfoEl  = document.getElementById('speech-info');

    /* ============================================================
       DÉVERROUILLAGE AUDIO — doit être appelé depuis un tap direct
       ============================================================
       iOS et Android refusent AudioContext et SpeechSynthesis
       si aucun geste utilisateur n'a eu lieu au préalable.
       L'overlay force ce premier geste.
       ============================================================ */
    function unlockAudio() {
      /* 1. Crée (ou reprend) l'AudioContext depuis le geste */
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      /* iOS met l'AudioContext en "suspended" au démarrage :
         il faut le reprendre DANS le handler du geste. */
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      /* 2. Déverrouille SpeechSynthesis sur iOS avec une utterance silencieuse.
         iOS requiert un premier speak() synchrone dans un event handler. */
      if (window.speechSynthesis) {
        const silent = new SpeechSynthesisUtterance(' ');
        silent.volume = 0;       // silencieuse
        silent.lang   = 'en-GB';
        window.speechSynthesis.speak(silent);
      }

      audioUnlocked = true;
    }

    /* ============================================================
       SPEECHSYNTHESIS — chargement des voix
       ============================================================ */
    /* ============================================================
       SpeechSynthesis — robuste iOS Safari
       ============================================================
       1. speak() indépendant de audioUnlocked
       2. PAS de utter.voice — instable sur iOS (on utilise utter.lang)
       3. PAS de cancel() systématique — tue la queue iOS
       4. Keepalive : iOS gèle speechSynthesis après ~15s sans appel
       ============================================================ */
    let speechReady = false;

    function loadVoices() {
      if (!window.speechSynthesis) return;
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) {
        speechReady = true;
        speechInfoEl.textContent = '🔊 Appuie sur le bouton pour entendre le mot en anglais !';
      }
    }
    if (window.speechSynthesis) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    /* Keepalive : empêche iOS de geler speechSynthesis */
    setInterval(() => {
      if (!window.speechSynthesis || window.speechSynthesis.speaking) return;
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }, 10000);

    function speak(text) {
      if (!window.speechSynthesis) return;
      try {
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang  = 'en-GB';   /* iOS choisit la voix selon lang */
        utter.rate  = 0.85;
        utter.pitch = 1.1;
        /* ⚠️ PAS de utter.voice = ... → instable sur iOS Safari */
        speakBtn.classList.add('speaking');
        utter.onend   = () => speakBtn.classList.remove('speaking');
        utter.onerror = () => speakBtn.classList.remove('speaking');
        window.speechSynthesis.speak(utter);
      } catch(e) { speakBtn.classList.remove('speaking'); }
    }

    /* ============================================================
       SONS AudioContext — succès et erreur
       ============================================================
       On réutilise le même audioCtx pour éviter le blocage mobile.
       ============================================================ */
    function playSuccess() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const notes = [523, 659, 784, 1046];
      notes.forEach((freq, i) => {
        const t    = audioCtx.currentTime + i * 0.12;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type            = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t);
        osc.stop (t + 0.22);
      });
    }

    function playError() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t    = audioCtx.currentTime;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type            = 'sawtooth';
      osc.frequency.value = 180;
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t);
      osc.stop (t + 0.42);
    }

    /* ============================================================
       INTERFACE THÈMES
       ============================================================ */
    function buildThemeSelector() {
      themeSelEl.innerHTML = '';
      Object.entries(THEMES).forEach(([key, theme]) => {
        const btn = document.createElement('button');
        btn.className = 'theme-btn' + (key === currentTheme ? ' active' : '');
        btn.textContent = theme.label;

        function selectTheme(e) {
          e.preventDefault();
          currentTheme = key;
          themeSelEl.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          newRound();
        }
        btn.addEventListener('click',      selectTheme, { passive: false });
        btn.addEventListener('touchstart', selectTheme, { passive: false });
        themeSelEl.appendChild(btn);
      });
    }

    /* ============================================================
       LOGIQUE DU JEU
       ============================================================ */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function newRound() {
      locked = false;
      feedbackEl.textContent = '';
      answersEl.innerHTML    = '';

      const items = THEMES[currentTheme].items;
      currentItem = items[Math.floor(Math.random() * items.length)];

      emojiEl.textContent   = currentItem.emoji;
      englishEl.textContent = currentItem.en;
      frenchEl.textContent  = ''; // masqué — c'est la réponse

      /* ⚠️  PAS de setTimeout(() => speak(...)) ici !
         Sur iOS le speak() doit venir d'un geste direct.
         L'enfant appuie sur 🔊 pour entendre le mot. */

      // Construit les 4 réponses
      const wrong        = items.filter(i => i.fr !== currentItem.fr);
      const shuffledWrong = shuffle(wrong).slice(0, 3);
      const choices       = shuffle([currentItem, ...shuffledWrong]);

      choices.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.innerHTML = `<span class="ans-emoji">${item.emoji}</span><span>${item.fr}</span>`;
        btn.setAttribute('aria-label', item.fr);

        function pick(e) {
          e.preventDefault();
          if (locked) return;
          locked = true;

          /* Resume AudioContext si suspendu (peut arriver après inactivité) */
          if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

          answersEl.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
          frenchEl.textContent = '= ' + currentItem.fr;

          if (item.fr === currentItem.fr) {
            goodCount++;
            goodEl.textContent = goodCount;
            btn.classList.add('correct');
            playSuccess();
            speak(currentItem.en); // ✅ appelé directement depuis le tap
            const msgs = ['🌟 Bravo !', '✨ Super !', '🎉 Excellent !', '👏 Well done !'];
            feedbackEl.textContent = msgs[Math.floor(Math.random() * msgs.length)];
            feedbackEl.style.color = '#4CAF50';
            setTimeout(newRound, 2000);
          } else {
            badCount++;
            badEl.textContent = badCount;
            btn.classList.add('wrong');
            playError();
            feedbackEl.textContent = '❌ Non ! La bonne réponse est : ' + currentItem.fr;
            feedbackEl.style.color = '#FF4B4B';
            answersEl.querySelectorAll('.ans-btn').forEach(b => {
              if (b.getAttribute('aria-label') === currentItem.fr) b.classList.add('correct');
            });
            setTimeout(newRound, 2200);
          }
        }

        btn.addEventListener('click',      pick, { passive: false });
        btn.addEventListener('touchstart', pick, { passive: false });
        answersEl.appendChild(btn);
      });
    }

    /* ---- Bouton 🔊 Écouter (appel direct depuis geste) ---- */
    function handleSpeak(e) {
      e.preventDefault();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      if (currentItem) speak(currentItem.en);
    }
    speakBtn.addEventListener('click',      handleSpeak, { passive: false });
    speakBtn.addEventListener('touchstart', handleSpeak, { passive: false });

    /* ============================================================
       OVERLAY DE DÉMARRAGE
       ============================================================
       Le bouton "Jouer !" est le PREMIER geste — il déverrouille
       AudioContext et SpeechSynthesis sur iOS/Android.
       ============================================================ */
    function handleUnlock(e) {
      e.preventDefault();
      unlockAudio();                          // ← dans le geste direct
      unlockOverlay.classList.add('hidden');  // masque l'overlay
      buildThemeSelector();
      newRound();
    }
    btnUnlock.addEventListener('click',      handleUnlock, { passive: false });
    btnUnlock.addEventListener('touchstart', handleUnlock, { passive: false });
  </script>
</body>
</html>
